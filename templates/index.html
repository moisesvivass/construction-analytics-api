<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Construction Analytics Dashboard</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <div class="header-content">
            <h1>Construction Analytics</h1>
            <p>Project Cost Management Dashboard</p>
        </div>
    </header>

    <main>
        <!-- Projects List -->
        <section class="section">
            <h2>Active Projects</h2>
            <div id="projects-grid" class="projects-grid">
                <p class="loading">Loading projects...</p>
            </div>
        </section>

        <!-- Project Detail -->
        <section class="section" id="project-detail" style="display:none">
            <div class="detail-header">
                <h2 id="detail-title">Project Detail</h2>
                <div class="header-buttons">
                    <button id="export-btn" class="btn-export">Export Excel</button>
                    <button id="insights-btn" class="btn-insights">AI Insights</button>
                </div>
            </div>

            <!-- Summary Cards -->
            <div class="cards-grid">
                <div class="card">
                    <span class="card-label">Budget</span>
                    <span class="card-value" id="card-budget">-</span>
                </div>
                <div class="card">
                    <span class="card-label">Actuals</span>
                    <span class="card-value" id="card-spent">-</span>
                </div>
                <div class="card">
                    <span class="card-label">Remaining</span>
                    <span class="card-value" id="card-remaining">-</span>
                </div>
                <div class="card">
                    <span class="card-label">% Used</span>
                    <span class="card-value" id="card-percent">-</span>
                </div>
            </div>

            <div id="insights-box" style="display:none" class="insights-box">
                <h3>AI Analysis</h3>
                <div id="insights-text"></div>
            </div>

            <!-- Charts -->
            <div class="charts-grid">
                <div class="chart-box">
                    <h3>Budget vs Actuals</h3>
                    <canvas id="budget-chart"></canvas>
                </div>
                <div class="chart-box">
                    <h3>Cost Breakdown</h3>
                    <canvas id="breakdown-chart"></canvas>
                </div>
            </div>

            <!-- Expenses Table -->
            <div class="table-box">
                <h3>Expenses</h3>
                <table id="expenses-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Description</th>
                            <th>Category</th>
                            <th>Amount</th>
                        </tr>
                    </thead>
                    <tbody id="expenses-body"></tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="/static/js/dashboard.js"></script>
</body>
</html>
